<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentall Games</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:
radial-gradient(circle at top, rgba(0,180,255,0.18), transparent 35%),
linear-gradient(180deg,#05070c,#0a1018,#05070c);
color:white;
overflow-x:hidden;
}

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
display:flex;
justify-content:flex-end;
gap:10px;
padding:14px 18px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.lang-btn{
border:none;
cursor:pointer;
padding:8px 12px;
border-radius:12px;
background:rgba(255,255,255,0.07);
color:white;
font-size:18px;
transition:0.25s;
}

.lang-btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,0.14);
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:90px 20px 40px;
}

.logo{
width:160px;
max-width:45vw;
margin-bottom:25px;
animation:breathe 4s ease-in-out infinite;
filter:drop-shadow(0 0 25px rgba(0,180,255,0.55));
}

@keyframes breathe{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.08);
}
}

h1{
font-size:clamp(42px,8vw,82px);
letter-spacing:-2px;
margin-bottom:18px;
background:linear-gradient(90deg,#ffffff,#7edcff,#ffffff);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
font-size:clamp(18px,3vw,24px);
color:#c3d3e0;
max-width:700px;
line-height:1.6;
margin-bottom:32px;
}

.buttons{
display:flex;
gap:14px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
padding:14px 22px;
border-radius:16px;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
transition:0.25s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,180,255,0.2);
}

.primary{
background:linear-gradient(135deg,#14a8ff,#52deff);
color:#00111d;
font-weight:bold;
}

.section{
max-width:950px;
margin:0 auto 30px;
padding:30px 22px;
border-radius:26px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.section h2{
font-size:30px;
margin-bottom:14px;
}

.section p{
line-height:1.7;
color:#ccd6e0;
}

.card{
margin-top:18px;
padding:22px;
border-radius:22px;
background:linear-gradient(135deg,rgba(0,180,255,0.14),rgba(255,255,255,0.03));
}

footer{
text-align:center;
padding:35px 20px;
color:#7d8a98;
font-size:14px;
}

a{
color:#82dfff;
}

@media(max-width:600px){
.topbar{
justify-content:center;
}
.logo{
width:125px;
}
}
</style>
</head>

<body>

<div class="topbar">
<button class="lang-btn" onclick="setLanguage('tr')">🇹🇷</button>
<button class="lang-btn" onclick="setLanguage('de')">🇩🇪</button>
<button class="lang-btn" onclick="setLanguage('en')">🇬🇧</button>
</div>

<section class="hero">
<img src="logo.png" class="logo">

<h1>Mentall Games</h1>

<p class="subtitle" id="subtitle"></p>

<div class="buttons">
<a href="#games" class="btn primary" id="btnGames"></a>
<a href="#contact" class="btn" id="btnContact"></a>
</div>
</section>

<section class="section" id="games">
<h2 id="gamesTitle"></h2>

<div class="card">
<h3>Kare Kapmaca</h3>
<p id="gameDesc"></p>

<p style="margin-top:14px;">
<a href="https://mentallgames.github.io/kare-kapmaca-privacy/" id="privacyText"></a>
</p>
</div>
</section>

<section class="section" id="contact">
<h2 id="contactTitle"></h2>
<p>Email: muhammedaliozdemir@aol.com</p>
</section>

<footer id="footerText"></footer>

<script>
const texts = {

tr:{
subtitle:"Strateji, karakter ve zekâyla dolu mobil oyunlar üretiyoruz.",
btnGames:"Oyunlar",
btnContact:"İletişim",
gamesTitle:"Oyunlarımız",
gameDesc:"Yapay zekâ rakipleri, combo sistemi ve defter temalı tasarımı olan stratejik masa oyunu.",
privacyText:"Gizlilik Politikası",
contactTitle:"İletişim",
footerText:"© 2026 Mentall Games. Tüm hakları saklıdır."
},

de:{
subtitle:"Wir entwickeln Mobile Games voller Strategie, Charakter und cleverer Ideen.",
btnGames:"Spiele",
btnContact:"Kontakt",
gamesTitle:"Unsere Spiele",
gameDesc:"Strategisches Brettspiel mit KI-Gegnern, Combo-System und Notizbuch-Stil.",
privacyText:"Datenschutz",
contactTitle:"Kontakt",
footerText:"© 2026 Mentall Games. Alle Rechte vorbehalten."
},

en:{
subtitle:"We craft mobile games filled with strategy, character and clever ideas.",
btnGames:"Games",
btnContact:"Contact",
gamesTitle:"Our Games",
gameDesc:"Strategic board game with AI opponents, combo system and notebook-style visuals.",
privacyText:"Privacy Policy",
contactTitle:"Contact",
footerText:"© 2026 Mentall Games. All rights reserved."
}

};

function setLanguage(lang){

localStorage.setItem("siteLang", lang);

document.documentElement.lang = lang;

document.getElementById("subtitle").innerText = texts[lang].subtitle;
document.getElementById("btnGames").innerText = texts[lang].btnGames;
document.getElementById("btnContact").innerText = texts[lang].btnContact;
document.getElementById("gamesTitle").innerText = texts[lang].gamesTitle;
document.getElementById("gameDesc").innerText = texts[lang].gameDesc;
document.getElementById("privacyText").innerText = texts[lang].privacyText;
document.getElementById("contactTitle").innerText = texts[lang].contactTitle;
document.getElementById("footerText").innerText = texts[lang].footerText;
}

function detectLanguage(){

let saved = localStorage.getItem("siteLang");

if(saved){
setLanguage(saved);
return;
}

let userLang = navigator.language.toLowerCase();

if(userLang.startsWith("tr")){
setLanguage("tr");
}
else if(userLang.startsWith("de")){
setLanguage("de");
}
else{
setLanguage("en");
}

}

detectLanguage();
</script>

</body>
</html>
