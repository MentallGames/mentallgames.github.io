<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentall Games</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(0,180,255,0.18), transparent 35%),
linear-gradient(180deg,#03050a,#09111b,#03050a);
color:white;
overflow-x:hidden;
}

/* INTRO */

.intro{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
animation:introHide 1.2s ease forwards;
animation-delay:3.8s;
}

.intro-logo-wrap{
display:inline-block;
position:relative;
z-index:2;
}

.intro-logo{
width:210px;
max-width:58vw;
cursor:pointer;
position:relative;
z-index:3;
filter:drop-shadow(0 0 28px rgba(0,180,255,0.65));
animation:breathe 3s ease-in-out infinite;
}

.intro-logo.impact{
animation:forgeImpact 0.72s cubic-bezier(.17,.89,.32,1.28),
breathe 3s ease-in-out infinite 0.72s;
}

.intro-title{
margin-top:18px;
font-size:30px;
letter-spacing:6px;
opacity:0;
font-family:'Orbitron',sans-serif;
font-weight:900;
text-transform:uppercase;
text-shadow:0 0 18px rgba(0,180,255,0.45);
animation:titleShow 1s ease forwards;
animation-delay:0.85s;
}

/* SPARKS */

.sparks{
position:absolute;
left:50%;
top:50%;
width:240px;
height:240px;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:1;
filter:blur(0.4px);
}

.sparks span{
position:absolute;
left:50%;
top:50%;
width:4px;
height:4px;
border-radius:50%;
background:#66eaff;
opacity:0;
box-shadow:0 0 16px #66eaff,0 0 16px rgba(102,234,255,0.7);
}

.sparks.active span{
animation:sparkBurst 0.62s ease-out forwards;
}

.sparks span:nth-child(1){--x:95px;--y:-22px;}
.sparks span:nth-child(2){--x:-88px;--y:-38px;}
.sparks span:nth-child(3){--x:78px;--y:70px;}
.sparks span:nth-child(4){--x:-76px;--y:76px;}
.sparks span:nth-child(5){--x:0px;--y:-105px;}
.sparks span:nth-child(6){--x:0px;--y:105px;}
.sparks span:nth-child(7){--x:118px;--y:24px;}
.sparks span:nth-child(8){--x:-118px;--y:18px;}
.sparks span:nth-child(9){--x:45px;--y:-100px;}
.sparks span:nth-child(10){--x:-48px;--y:100px;}

@keyframes sparkBurst{
0%{
opacity:1;
transform:translate(-50%,-50%) scale(1.8);
}
55%{
opacity:1;
}
100%{
opacity:0;
transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(0.15);
}
}

/* ANIMATIONS */

@keyframes forgeImpact{
0%{
transform:scale(1);
filter:drop-shadow(0 0 18px rgba(0,180,255,0.45));
}
10%{
transform:scale(1.38) rotate(-3deg);
filter:drop-shadow(0 0 120px rgba(0,240,255,1));
}
18%{
transform:scale(0.80) rotate(3deg);
filter:drop-shadow(0 0 70px rgba(0,240,255,0.95));
}
28%{
transform:scale(1.16) rotate(-1.5deg);
}
40%{
transform:scale(0.92) rotate(1deg);
}
54%{
transform:scale(1.08);
}
68%{
transform:scale(0.98);
}
100%{
transform:scale(1);
filter:drop-shadow(0 0 28px rgba(0,180,255,0.65));
}
}

@keyframes breathe{
0%,100%{transform:scale(1);}
50%{transform:scale(1.08);}
}

@keyframes titleShow{

0%{
opacity:0;
transform:scale(0.6);
filter:blur(6px);
text-shadow:0 0 0 rgba(0,180,255,0);
}

35%{
opacity:1;
transform:scale(1.22);
filter:blur(0px);
text-shadow:0 0 28px rgba(0,220,255,1);
}

55%{
transform:scale(0.94);
}

75%{
transform:scale(1.06);
}

100%{
opacity:1;
transform:scale(1);
text-shadow:0 0 18px rgba(0,180,255,0.45);
}

}

@keyframes introHide{
to{
opacity:0;
visibility:hidden;
}
}

@keyframes pageShow{
to{opacity:1;}
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:flex-end;
gap:10px;
padding:14px 18px;
z-index:100;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.lang-btn{
border:none;
cursor:pointer;
padding:8px 12px;
border-radius:12px;
font-size:18px;
background:rgba(255,255,255,0.08);
color:white;
transition:0.25s;
}

.lang-btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,0.16);
}

/* PAGE */

.page{
opacity:0;
animation:pageShow 1.4s ease forwards;
animation-delay:4.1s;
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:90px 20px 40px;
}

.hero a{
display:inline-block;
}

.hero-logo{
width:165px;
margin-bottom:24px;
animation:breathe 4s ease-in-out infinite;
filter:drop-shadow(0 0 24px rgba(0,180,255,0.55));
cursor:pointer;
transition:0.25s;
}

.hero-logo:hover{
transform:scale(1.06);
}

h1{
font-family:'Orbitron',sans-serif;
font-weight:900;
text-transform:uppercase;
font-size:clamp(42px,8vw,82px);
margin-bottom:18px;
letter-spacing:5px;
line-height:1.1;
background:linear-gradient(90deg,#fff,#8de2ff,#fff);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 24px rgba(0,180,255,0.18);
}

.subtitle{
font-size:clamp(18px,3vw,24px);
color:#c6d6e3;
line-height:1.6;
max-width:720px;
margin-bottom:32px;
}

.buttons{
display:flex;
gap:14px;
flex-wrap:wrap;
justify-content:center;
}

.btn{
padding:14px 22px;
border-radius:16px;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);
transition:0.25s;
font-weight:600;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(0,180,255,0.18);
}

.primary{
background:linear-gradient(135deg,#18a9ff,#57e1ff);
color:#00131d;
font-weight:700;
}

.section{
max-width:950px;
margin:0 auto 30px;
padding:30px 22px;
border-radius:26px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
}

.section h2{
font-size:30px;
margin-bottom:14px;
font-family:'Orbitron',sans-serif;
letter-spacing:2px;
}

.section p{
line-height:1.7;
color:#ccd7e1;
}

.card{
margin-top:18px;
padding:22px;
border-radius:22px;
background:linear-gradient(135deg,rgba(0,180,255,0.14),rgba(255,255,255,0.03));
}

footer{
text-align:center;
padding:34px 20px;
font-size:14px;
color:#7f8b98;
}

a{
color:#84e3ff;
text-decoration:none;
}

@media(max-width:600px){

.topbar{
justify-content:center;
}

.hero-logo{
width:135px;
}

.intro-logo{
width:165px;
}

.sparks{
width:190px;
height:190px;
}

.intro-title{
font-size:22px;
letter-spacing:4px;
}

h1{
letter-spacing:2px;
font-size:36px;
}

}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">

<a href="https://mentallgames.com" class="intro-logo-wrap">

<div class="sparks">
<span></span><span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span><span></span>
</div>

<img src="Logo.png" alt="Mentall Games Logo" class="intro-logo">

</a>

<div class="intro-title">MENTALL GAMES</div>

</div>

<audio id="forgeSound" src="hammer.mp3" preload="auto"></audio>

<!-- TOPBAR -->
<div class="topbar">
<button class="lang-btn" onclick="setLanguage('tr')">🇹🇷</button>
<button class="lang-btn" onclick="setLanguage('de')">🇩🇪</button>
<button class="lang-btn" onclick="setLanguage('en')">🇬🇧</button>
</div>

<!-- PAGE -->
<div class="page">

<section class="hero">

<a href="https://mentallgames.com">
<img src="Logo.png" class="hero-logo">
</a>

<h1>Mentall Games</h1>

<p class="subtitle" id="subtitle"></p>

<div class="buttons">
<a href="#games" class="btn primary" id="btnGames"></a>
<a href="#contact" class="btn" id="btnContact"></a>
</div>

</section>

<section class="section" id="games">
<h2 id="gamesTitle"></h2>

<div class="card">
<h3>Kare Kapmaca</h3>
<p id="gameDesc"></p>

<p style="margin-top:14px;">
<a href="https://mentallgames.com/kare-kapmaca-privacy/" id="privacyText"></a>
</p>
</div>
</section>

<section class="section" id="contact">
<h2 id="contactTitle"></h2>
<p>Email: muhammedaliozdemir@aol.com</p>
</section>

<footer id="footerText"></footer>

</div>

<script>
const texts={
tr:{
subtitle:"Strateji, karakter ve zekâyla dolu mobil oyunlar geliştiriyoruz.",
btnGames:"Oyunlar",
btnContact:"İletişim",
gamesTitle:"Oyunlarımız",
gameDesc:"Yapay zekâ rakipleri, combo sistemi ve defter temalı tasarımı olan stratejik masa oyunu.",
privacyText:"Gizlilik Politikası",
contactTitle:"İletişim",
footerText:"© 2026 Mentall Games. Tüm hakları saklıdır."
},
de:{
subtitle:"Wir entwickeln Mobile Games voller Strategie, Charakter und cleverer Ideen.",
btnGames:"Spiele",
btnContact:"Kontakt",
gamesTitle:"Unsere Spiele",
gameDesc:"Strategisches Brettspiel mit KI-Gegnern, Combo-System und Notizbuch-Stil.",
privacyText:"Datenschutz",
contactTitle:"Kontakt",
footerText:"© 2026 Mentall Games. Alle Rechte vorbehalten."
},
en:{
subtitle:"We craft mobile games filled with strategy, character and clever ideas.",
btnGames:"Games",
btnContact:"Contact",
gamesTitle:"Our Games",
gameDesc:"Strategic board game with AI opponents, combo system and notebook-style visuals.",
privacyText:"Privacy Policy",
contactTitle:"Contact",
footerText:"© 2026 Mentall Games. All rights reserved."
}
};

function setLanguage(lang){
localStorage.setItem("siteLang",lang);
document.documentElement.lang=lang;

document.getElementById("subtitle").innerText=texts[lang].subtitle;
document.getElementById("btnGames").innerText=texts[lang].btnGames;
document.getElementById("btnContact").innerText=texts[lang].btnContact;
document.getElementById("gamesTitle").innerText=texts[lang].gamesTitle;
document.getElementById("gameDesc").innerText=texts[lang].gameDesc;
document.getElementById("privacyText").innerText=texts[lang].privacyText;
document.getElementById("contactTitle").innerText=texts[lang].contactTitle;
document.getElementById("footerText").innerText=texts[lang].footerText;
}

function detectLanguage(){
let saved=localStorage.getItem("siteLang");

if(saved){
setLanguage(saved);
return;
}

let userLang=navigator.language.toLowerCase();

if(userLang.startsWith("tr")) setLanguage("tr");
else if(userLang.startsWith("de")) setLanguage("de");
else setLanguage("en");
}

detectLanguage();

/* FORGE INTRO */

window.addEventListener("load",function(){

setTimeout(function(){

document.querySelector(".intro-logo").classList.add("impact");
document.querySelector(".sparks").classList.add("active");

const sound=document.getElementById("forgeSound");
sound.volume=0.75;
sound.play().catch(function(){});

},850);

});
</script>

</body>
</html>
